services:
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.1'

  main:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/sto-main:${IMAGE_TAG}
    container_name: app-main
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /srv/stone/app/files:/app/files
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY}
      BLOCKCHAIN_WALLET_ENCRYPTION_KEY: ${BLOCKCHAIN_WALLET_ENCRYPTION_KEY}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}
      BLOCKCHAIN_CONTRACT_ADDRESS: ${BLOCKCHAIN_CONTRACT_ADDRESS}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '0.3'

  match:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/sto-match:${IMAGE_TAG}
    container_name: app-match
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}
      BLOCKCHAIN_CONTRACT_ADDRESS: ${BLOCKCHAIN_CONTRACT_ADDRESS_MATCH}
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 1.5g
          cpus: '0.2'

  batch:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/sto-batch:${IMAGE_TAG}
    container_name: app-batch
    restart: always
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}
      BLOCKCHAIN_CONTRACT_ADDRESS: ${BLOCKCHAIN_CONTRACT_ADDRESS_BATCH}
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.1'

  nginx:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/sto-nginx:${IMAGE_TAG}
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - main
