# ?? ??
server.port=8080

# CORS
localhost=https://sto.bgchoi.com
match.server.url=http://app-match:8081

# DB
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.highlight_sql=false

logging.level.org.hibernate.orm.jdbc.bind=INFO

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Redis
spring.data.redis.host=redis
spring.data.redis.port=6379

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=3600000

# Swagger
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.api-docs.path=/api-docs/json

# ?? ??
file.path=/app/files

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Blockchain
blockchain.issuer-private-key=${BLOCKCHAIN_PRIVATE_KEY}
blockchain.wallet-encryption-key=${BLOCKCHAIN_WALLET_ENCRYPTION_KEY}
blockchain.rpc-url=${BLOCKCHAIN_RPC_URL}

spring.jackson.time-zone=Asia/Seoul
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# Gemini AI
gemini.api.url=https://generativelanguage.googleapis.com
gemini.api.key=${GEMINI_API_KEY:}

# Naver News API
naver.api.client-id=${NAVER_CLIENT_ID:}
naver.api.client-secret=${NAVER_CLIENT_SECRET:}
naver.api.news-url=https://openapi.naver.com/v1/search/news.json
